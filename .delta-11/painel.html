<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FORMAÇÃO Δ-11 — Centro de Comando</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep: #080808;
    --bg-panel: #0e0e0e;
    --bg-card: #141414;
    --bg-card-hover: #1c1010;
    --border: #2a2a2a;
    --border-glow: #3a2020;
    --text-primary: #f0f0f0;
    --text-secondary: #999999;
    --text-muted: #666666;
    --atlas: #ff2020; --cronos: #ff2020; --front: #ff2020;
    --pixel: #ff2020; --form: #ff2020; --back: #ff2020;
    --engine: #ff2020; --vault: #ff2020; --shield: #ff2020; --scout: #ff2020;
    --fazendo: #ffffff; --revisao: #5ce68a; --concluido: #1b8a2a; --bloqueado: #ff1744;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Outfit', sans-serif; background: var(--bg-deep); color: var(--text-primary); min-height: 100vh; overflow-x: hidden; }
  body::before {
    content: ''; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: linear-gradient(180deg, rgba(8,8,8,0.82) 0%, rgba(8,8,8,0.87) 40%, rgba(8,8,8,0.92) 100%), url('bg-delta11.png') center center / cover no-repeat;
    pointer-events: none; z-index: 0;
  }
  body::after {
    content: ''; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 60px 60px; pointer-events: none; z-index: 0;
  }

  /* HEADER */
  .header {
    position: relative; z-index: 1; padding: 24px 40px 18px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, rgba(10,10,10,0.97) 0%, rgba(5,5,5,0.85) 100%);
    backdrop-filter: blur(20px);
  }
  .header-left { display: flex; align-items: center; gap: 20px; }
  .logo { font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 600; letter-spacing: 4px; text-transform: uppercase; color: var(--text-muted); }
  .logo .delta { font-size: 28px; font-weight: 800; letter-spacing: -1px; color: var(--atlas); text-shadow: 0 0 30px rgba(255,32,32,0.4); font-family: 'Outfit', sans-serif; }
  .logo .eleven { color: var(--text-primary); font-size: 28px; font-weight: 800; font-family: 'Outfit', sans-serif; }
  .header-status { display: flex; align-items: center; gap: 32px; }
  .status-item { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; }
  .status-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); }
  .status-value { font-weight: 600; font-size: 15px; color: var(--text-primary); }
  .status-value.fase { color: var(--atlas); }
  .btn-refresh { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 1px; text-transform: uppercase; padding: 8px 16px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg-panel); color: var(--text-secondary); cursor: pointer; transition: all 0.2s; }
  .btn-refresh:hover { border-color: var(--atlas); color: var(--atlas); box-shadow: 0 0 20px rgba(255,32,32,0.15); }
  .btn-refresh.loading { animation: pulse 0.6s ease-in-out; }

  /* OPERATIVOS BAR */
  .operativos-bar {
    position: relative; z-index: 1;
    display: flex; justify-content: center; align-items: flex-end; gap: 8px;
    padding: 12px 20px 10px;
    background: linear-gradient(180deg, rgba(4,4,4,0.98), rgba(8,8,8,0.96));
    border-bottom: 1px solid #1a1a1a;
    overflow-x: auto;
  }
  .operativo { display: flex; flex-direction: column; align-items: center; gap: 3px; min-width: 58px; position: relative; }
  .operativo-nome { font-family: 'JetBrains Mono', monospace; font-size: 8px; letter-spacing: 1.5px; text-transform: uppercase; color: #333; white-space: nowrap; }
  .operativo.ativo .operativo-nome { color: var(--atlas); text-shadow: 0 0 8px rgba(255,32,32,0.6); }
  .operativo-sprite-wrap { position: relative; height: 136px; display: flex; align-items: flex-end; justify-content: center; overflow: visible; }
  .operativo-sprite { image-rendering: pixelated; image-rendering: crisp-edges; display: block; }

  /* ATIVO: animação de luta/treinamento */
  @keyframes soldier-fight {
    0%,100% { transform: translateY(0px) rotate(0deg); }
    15%     { transform: translateY(-7px) rotate(-6deg); }
    30%     { transform: translateY(-13px) rotate(7deg); }
    50%     { transform: translateY(-4px) rotate(0deg); }
    65%     { transform: translateY(-10px) rotate(-5deg) scaleX(-1); }
    82%     { transform: translateY(-5px) rotate(4deg) scaleX(-1); }
  }

  /* ZZZ */
  .zzz-wrap { position: absolute; top: 4px; right: 0px; width: 28px; height: 32px; pointer-events: none; }
  .zzz { position: absolute; font-family: 'JetBrains Mono', monospace; color: #3355aa; opacity: 0; line-height: 1; }
  .zzz:nth-child(1) { font-size: 7px; left: 2px; bottom: 0; animation: floatZ 2.6s ease-out infinite 0s; }
  .zzz:nth-child(2) { font-size: 9px; left: 7px; bottom: 0; animation: floatZ 2.6s ease-out infinite 0.87s; }
  .zzz:nth-child(3) { font-size: 12px; left: 11px; bottom: 0; animation: floatZ 2.6s ease-out infinite 1.74s; }
  @keyframes floatZ {
    0%   { opacity: 0; transform: translateY(0) translateX(0); }
    15%  { opacity: 0.85; }
    85%  { opacity: 0.2; }
    100% { opacity: 0; transform: translateY(-28px) translateX(12px); }
  }

  .operativo-status { font-family: 'JetBrains Mono', monospace; font-size: 7px; letter-spacing: 0.5px; text-transform: uppercase; }
  .operativo.ativo .operativo-status { color: var(--atlas); }
  .operativo:not(.ativo) .operativo-status { color: #282828; }

  /* PROGRESS */
  .progress-bar-container { position: relative; z-index: 1; padding: 0 40px; background: var(--bg-deep); border-bottom: 1px solid var(--border); }
  .progress-track { height: 3px; background: var(--border); position: relative; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #b71c1c, #ff2020); transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 0 20px rgba(255,32,32,0.3); }
  .progress-info { display: flex; justify-content: space-between; padding: 8px 0; }
  .progress-text { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-muted); letter-spacing: 1px; }
  .progress-percent { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--shield); font-weight: 600; }

  /* BOARD */
  .board { position: relative; z-index: 1; display: flex; gap: 0; padding: 0; overflow-x: auto; min-height: calc(100vh - 240px); }
  .column { min-width: 240px; max-width: 280px; flex: 1; display: flex; flex-direction: column; border-right: 1px solid var(--border); }
  .column:last-child { border-right: none; }
  .column-header { padding: 16px 16px 12px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--bg-deep); z-index: 2; }
  .column-title { font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 600; letter-spacing: 2.5px; text-transform: uppercase; color: var(--text-muted); display: flex; align-items: center; gap: 8px; }
  .column-title .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .column-count { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-muted); margin-left: auto; background: var(--bg-card); padding: 2px 7px; border-radius: 4px; }
  .column-body { padding: 10px; display: flex; flex-direction: column; gap: 8px; flex: 1; overflow-y: auto; }
  .column.fazendo .column-header { border-bottom-color: var(--fazendo); }
  .column.revisao .column-header { border-bottom-color: var(--revisao); }
  .column.concluido .column-header { border-bottom-color: var(--concluido); }
  .column.bloqueado .column-header { border-bottom-color: var(--bloqueado); }

  /* CARDS */
  .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; transition: all 0.2s; cursor: default; position: relative; overflow: hidden; animation: fadeIn 0.3s ease-out both; }
  .card::before { content: ''; position: absolute; top: 0; left: 0; width: 3px; height: 100%; border-radius: 3px 0 0 3px; }
  .card:hover { background: var(--bg-card-hover); border-color: var(--border-glow); transform: translateY(-1px); }
  .card:nth-child(2) { animation-delay: 0.05s; } .card:nth-child(3) { animation-delay: 0.1s; }
  .card-id { font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 600; color: var(--text-muted); letter-spacing: 1px; margin-bottom: 4px; }
  .card-desc { font-size: 13px; font-weight: 400; color: var(--text-primary); line-height: 1.4; margin-bottom: 8px; }
  .card-meta { display: flex; align-items: center; justify-content: space-between; }
  .card-agent { font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 600; letter-spacing: 1px; padding: 2px 8px; border-radius: 4px; background: rgba(255,255,255,0.05); }
  .card-time { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-muted); }
  .card-motivo { font-size: 11px; color: var(--bloqueado); font-style: italic; margin-top: 4px; padding-top: 6px; border-top: 1px solid rgba(239,68,68,0.1); }
  .card.agent-ATLAS::before { background: var(--atlas); } .card.agent-ATLAS .card-agent { color: var(--atlas); }
  .card.agent-CRONOS::before { background: var(--cronos); } .card.agent-CRONOS .card-agent { color: var(--cronos); }
  .card.agent-FRONT::before { background: var(--front); } .card.agent-FRONT .card-agent { color: var(--front); }
  .card.agent-PIXEL::before { background: var(--pixel); } .card.agent-PIXEL .card-agent { color: var(--pixel); }
  .card.agent-FORM::before { background: var(--form); } .card.agent-FORM .card-agent { color: var(--form); }
  .card.agent-BACK::before { background: var(--back); } .card.agent-BACK .card-agent { color: var(--back); }
  .card.agent-ENGINE::before { background: var(--engine); } .card.agent-ENGINE .card-agent { color: var(--engine); }
  .card.agent-VAULT::before { background: var(--vault); } .card.agent-VAULT .card-agent { color: var(--vault); }
  .card.agent-SHIELD::before { background: var(--shield); } .card.agent-SHIELD .card-agent { color: var(--shield); }
  .card.agent-SCOUT::before { background: var(--scout); } .card.agent-SCOUT .card-agent { color: var(--scout); }
  .column.fazendo .card::before { background: var(--fazendo) !important; } .column.fazendo .card-agent { color: var(--fazendo) !important; }
  .column.fazendo .card { border-color: rgba(255,255,255,0.12); } .column.fazendo .card-id { color: var(--fazendo); }
  .column.revisao .card::before { background: var(--revisao) !important; } .column.revisao .card-agent { color: var(--revisao) !important; }
  .column.revisao .card { border-color: rgba(92,230,138,0.12); } .column.revisao .card-id { color: var(--revisao); }
  .column.concluido .card::before { background: var(--concluido) !important; } .column.concluido .card-agent { color: var(--concluido) !important; }
  .column.concluido .card { border-color: rgba(0,255,65,0.1); } .column.concluido .card-id { color: var(--concluido); }
  .card.blocked { border-color: rgba(255,23,68,0.2); background: rgba(255,23,68,0.03); }
  .card.blocked::before { background: var(--bloqueado) !important; }
  .column.bloqueado .card-agent { color: var(--bloqueado) !important; } .column.bloqueado .card-id { color: var(--bloqueado); }

  /* EMPTY */
  .empty-state { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; height: calc(100vh - 240px); text-align: center; padding: 40px; }
  .empty-delta { font-family: 'Outfit', sans-serif; font-size: 120px; font-weight: 900; color: var(--atlas); opacity: 0.08; line-height: 1; margin-bottom: -20px; }
  .empty-title { font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 12px; }
  .empty-desc { font-size: 15px; color: var(--text-muted); max-width: 400px; line-height: 1.6; }
  .empty-code { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--atlas); background: var(--bg-card); border: 1px solid var(--border); padding: 12px 24px; border-radius: 8px; margin-top: 24px; }

  /* LEGEND */
  .legend { position: relative; z-index: 1; padding: 12px 40px; border-top: 1px solid var(--border); display: flex; gap: 16px; flex-wrap: wrap; background: var(--bg-deep); }
  .legend-item { display: flex; align-items: center; gap: 6px; font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 1px; color: var(--text-muted); }
  .legend-dot { width: 6px; height: 6px; border-radius: 50%; }
  .legend-item.active .legend-dot { box-shadow: 0 0 8px currentColor; }
  .legend-item.active { color: var(--text-secondary); }

  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
  .live-dot { width: 6px; height: 6px; background: var(--shield); border-radius: 50%; display: inline-block; animation: blink 2s ease-in-out infinite; margin-right: 6px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="logo">
      <span class="delta">Δ</span><span class="eleven">-11</span>
      <br>CENTRO DE COMANDO
    </div>
  </div>
  <div class="header-status">
    <div class="status-item"><span class="status-label">Projeto</span><span class="status-value" id="st-projeto">—</span></div>
    <div class="status-item"><span class="status-label">Complexidade</span><span class="status-value" id="st-complexidade">—</span></div>
    <div class="status-item"><span class="status-label">Fase</span><span class="status-value fase" id="st-fase">—</span></div>
    <div class="status-item"><span class="status-label">Atualização</span><span class="status-value" id="st-update"><span class="live-dot"></span>—</span></div>
    <button class="btn-refresh" onclick="manualRefresh()" id="btn-refresh">↻ ATUALIZAR</button>
  </div>
</div>

<div class="operativos-bar" id="operativos-bar"></div>

<div class="progress-bar-container">
  <div class="progress-info">
    <span class="progress-text" id="progress-text">Aguardando dados...</span>
    <span class="progress-percent" id="progress-percent">0%</span>
  </div>
  <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
</div>

<div id="board-container"></div>
<div class="legend" id="legend"></div>

<script src="kanban-data.js"></script>
<script>
const AGENT_COLORS = { ATLAS:'#ff2020',CRONOS:'#ff2020',FRONT:'#ff2020',PIXEL:'#ff2020',FORM:'#ff2020',BACK:'#ff2020',ENGINE:'#ff2020',VAULT:'#ff2020',SHIELD:'#ff2020',SCOUT:'#ff2020' };
const AGENT_NAMES  = { ATLAS:'Arquiteto',CRONOS:'Gerente',FRONT:'Interface',PIXEL:'Visual',FORM:'Formulários',BACK:'Servidor',ENGINE:'Engine',VAULT:'Banco',SHIELD:'Qualidade',SCOUT:'Correção' };

// ── DELTA-11 PIXEL ART SPRITES (gerados das imagens oficiais) ──────────────
const AGENTS = ['ATLAS','CRONOS','FRONT','PIXEL','FORM','BACK','ENGINE','VAULT','SHIELD','SCOUT'];
const SP_W = 40, SP_H = 120;  // largura e altura de cada sprite exibido

// Pré-carrega todos os sprites
const _imgs = {};
let _imgsLoaded = 0, _pendingAnim = false;

AGENTS.forEach(ag => {
  const img = new Image();
  img.onload = () => { _imgsLoaded++; if (_imgsLoaded >= AGENTS.length && _pendingAnim) { _pendingAnim = false; _loop(); } };
  img.src = 'sprites/' + ag + '.png';
  _imgs[ag] = img;
});

let _raf = null;

function _loop() {
  document.querySelectorAll('.operativo-canvas').forEach(cv => {
    const ctx = cv.getContext('2d');
    const img = _imgs[cv.dataset.ag];
    if (!img || !img.complete) return;
    ctx.clearRect(0, 0, cv.width, cv.height);
    ctx.imageSmoothingEnabled = false;
    if (cv.dataset.act === '1') {
      ctx.drawImage(img, 0, 0, 96, 288, 0, 0, SP_W, SP_H);
    } else {
      ctx.save();
      ctx.translate(0, cv.height);
      ctx.rotate(-Math.PI / 2);
      ctx.drawImage(img, 0, 0, 96, 288, 0, 0, SP_W, SP_H);
      ctx.restore();
    }
  });
  _raf = requestAnimationFrame(_loop);
}

function _startAnim() {
  if (_raf) cancelAnimationFrame(_raf);
  if (_imgsLoaded >= AGENTS.length) { _loop(); } else { _pendingAnim = true; }
}

function getActiveAgents(data) {
  const s = new Set();
  if (data) (data.fazendo || []).forEach(t => t.agente && s.add(t.agente));
  return s;
}

function renderOperativos(data) {
  const bar = document.getElementById('operativos-bar');
  if (!bar) return;
  const active = getActiveAgents(data);

  bar.innerHTML = AGENTS.map(ag => {
    const isAct = active.has(ag);
    const nome  = ag + (ag === 'SHIELD' ? ' \u2640' : '');

    // Ativo: canvas 40x120 (em pé). Dormindo: canvas 120x40 (deitado rotacionado)
    const cw = isAct ? SP_W : SP_H;
    const ch = isAct ? SP_H : SP_W;

    const filt = isAct
      ? 'drop-shadow(0 0 8px rgba(255,50,50,0.9)) drop-shadow(0 0 22px rgba(255,50,50,0.35))'
      : 'saturate(0.12) brightness(0.35)';
    const anim = isAct ? 'animation:soldier-fight 1.1s ease-in-out infinite;' : 'opacity:0.45;';
    const style = `filter:${filt};${anim}`;

    const zzz = !isAct
      ? `<div class="zzz-wrap"><span class="zzz">z</span><span class="zzz">z</span><span class="zzz">Z</span></div>`
      : '';

    return `
      <div class="operativo${isAct ? ' ativo' : ''}">
        <div class="operativo-nome">${nome}</div>
        <div class="operativo-sprite-wrap">
          ${zzz}
          <canvas class="operativo-canvas operativo-sprite"
            width="${cw}" height="${ch}"
            data-act="${isAct ? '1' : '0'}"
            data-ag="${ag}"
            style="${style}"
          ></canvas>
        </div>
        <div class="operativo-status">${isAct ? '\u25c9 ATIVO' : '\u00b7 rest'}</div>
      </div>`;
  }).join('');

  _startAnim();
}

// ══════════════════════════════════════════════════════

function createCard(item, type) {
  const agente = item.agente || item.por || '';
  const card = document.createElement('div');
  card.className = `card agent-${agente}${type === 'bloqueado' ? ' blocked' : ''}`;
  let meta = '';
  if (item.inicio) meta = `<span class="card-time">${item.inicio}</span>`;
  if (item.data)   meta = `<span class="card-time">${item.data}</span>`;
  let extra = '';
  if (item.motivo)  extra = `<div class="card-motivo">⚠ ${item.motivo}</div>`;
  if (item.revisor) extra = `<div class="card-time" style="margin-top:4px">Revisor: ${item.revisor}</div>`;
  card.innerHTML = `<div class="card-id">${item.id||''}</div><div class="card-desc">${item.desc||''}</div><div class="card-meta"><span class="card-agent">${agente}</span>${meta}</div>${extra}`;
  return card;
}

function renderBoard(data) {
  renderOperativos(data);
  const container = document.getElementById('board-container');
  if (!data || (!data.projeto && (!data.fazendo || data.fazendo.length===0) && (!data.concluido || data.concluido.length===0))) {
    container.innerHTML = `<div class="empty-state"><div class="empty-delta">Δ</div><div class="empty-title">Aguardando missão</div><div class="empty-desc">Nenhum projeto ativo. Abra o Claude Code e inicie com:</div><div class="empty-code">d11 + descrição do projeto</div></div>`;
    return;
  }
  document.getElementById('st-projeto').textContent = data.projeto || '—';
  document.getElementById('st-complexidade').textContent = data.complexidade || '—';
  document.getElementById('st-fase').textContent = data.fase_atual || '—';
  document.getElementById('st-update').innerHTML = `<span class="live-dot"></span>${data.ultima_atualizacao||'—'}`;
  let total = 0, done = (data.concluido||[]).length;
  Object.values(data.a_fazer||{}).forEach(a => total += a.length);
  total += (data.fazendo||[]).length + (data.revisao||[]).length + done + (data.bloqueado||[]).length;
  const pct = total > 0 ? Math.round(done/total*100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-percent').textContent = pct + '%';
  document.getElementById('progress-text').textContent = `${done} de ${total} tarefas concluídas`;

  let html = '<div class="board">';
  const activeAgents = [];
  for (const [ag, tasks] of Object.entries(data.a_fazer||{})) {
    if (!tasks.length) continue;
    activeAgents.push(ag);
    const col = AGENT_COLORS[ag]||'#888';
    html += `<div class="column"><div class="column-header"><div class="column-title"><span class="dot" style="background:${col};box-shadow:0 0 8px ${col}"></span>${ag}<span class="column-count">${tasks.length}</span></div></div><div class="column-body">${tasks.map(t=>{const i=typeof t==='string'?{id:'',desc:t,agente:ag}:{...t,agente:ag};return createCard(i,'afazer').outerHTML;}).join('')}</div></div>`;
  }
  const faz = data.fazendo||[];
  html += `<div class="column fazendo"><div class="column-header"><div class="column-title"><span class="dot" style="background:var(--fazendo);box-shadow:0 0 8px var(--fazendo)"></span>FAZENDO<span class="column-count">${faz.length}</span></div></div><div class="column-body">${faz.map(t=>createCard(t,'fazendo').outerHTML).join('')}</div></div>`;
  const rev = data.revisao||[];
  html += `<div class="column revisao"><div class="column-header"><div class="column-title"><span class="dot" style="background:var(--revisao);box-shadow:0 0 8px var(--revisao)"></span>REVISÃO<span class="column-count">${rev.length}</span></div></div><div class="column-body">${rev.map(t=>createCard(t,'revisao').outerHTML).join('')}</div></div>`;
  const conc = data.concluido||[];
  html += `<div class="column concluido"><div class="column-header"><div class="column-title"><span class="dot" style="background:var(--concluido);box-shadow:0 0 8px var(--concluido)"></span>CONCLUÍDO<span class="column-count">${conc.length}</span></div></div><div class="column-body">${conc.map(t=>createCard(t,'concluido').outerHTML).join('')}</div></div>`;
  const blq = data.bloqueado||[];
  if (blq.length) html += `<div class="column bloqueado"><div class="column-header"><div class="column-title"><span class="dot" style="background:var(--bloqueado);box-shadow:0 0 8px var(--bloqueado)"></span>BLOQUEADO<span class="column-count">${blq.length}</span></div></div><div class="column-body">${blq.map(t=>createCard(t,'bloqueado').outerHTML).join('')}</div></div>`;
  html += '</div>';
  container.innerHTML = html;

  const allAg = new Set([...activeAgents,...faz.map(t=>t.agente),...rev.map(t=>t.por),...conc.map(t=>t.por),...blq.map(t=>t.agente)].filter(Boolean));
  document.getElementById('legend').innerHTML = Object.entries(AGENT_COLORS).map(([ag,col]) => {
    const on = allAg.has(ag);
    return `<div class="legend-item ${on?'active':''}"><span class="legend-dot" style="background:${col}${on?';box-shadow:0 0 6px '+col:''}"></span>${ag} <span style="opacity:.5">${AGENT_NAMES[ag]||''}</span></div>`;
  }).join('');
}

let lastHash = '';
const hashData = d => JSON.stringify(d);

function refreshData() {
  const old = document.querySelector('script[src^="kanban-data.js"]');
  if (old) old.remove();
  const s = document.createElement('script');
  s.src = 'kanban-data.js?t=' + Date.now();
  s.onload = () => { const h = hashData(window.KANBAN_DATA); if (h !== lastHash) { lastHash = h; renderBoard(window.KANBAN_DATA); } };
  document.head.appendChild(s);
}

function manualRefresh() {
  const btn = document.getElementById('btn-refresh');
  btn.classList.add('loading'); btn.textContent = '↻ CARREGANDO...';
  const old = document.querySelector('script[src^="kanban-data.js"]');
  if (old) old.remove();
  const s = document.createElement('script');
  s.src = 'kanban-data.js?t=' + Date.now();
  s.onload = () => { lastHash = hashData(window.KANBAN_DATA); renderBoard(window.KANBAN_DATA); btn.classList.remove('loading'); btn.textContent = '↻ ATUALIZAR'; };
  s.onerror = () => { btn.classList.remove('loading'); btn.textContent = '↻ ATUALIZAR'; };
  document.head.appendChild(s);
}

if (window.KANBAN_DATA) { lastHash = hashData(window.KANBAN_DATA); renderBoard(window.KANBAN_DATA); }
else renderOperativos(null);

setInterval(refreshData, 5000);
</script>
</body>
</html>
