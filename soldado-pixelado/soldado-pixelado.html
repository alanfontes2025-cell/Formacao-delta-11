<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>SOLDADO PIXELADO — COMBAT ZONE</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: monospace;
    }

    .arcade-frame {
      border: 4px solid #ff2244;
      box-shadow:
        0 0 0 2px #000,
        0 0 0 6px #ffdd00,
        0 0 0 8px #000,
        0 0 40px #ff224480,
        0 0 80px #ff224440;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    canvas {
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    .credits {
      margin-top: 12px;
      color: #ff2244;
      font-size: 11px;
      letter-spacing: 3px;
      text-shadow: 0 0 8px #ff224488;
      animation: blink 1.2s step-start infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }
  </style>
</head>
<body>

  <div class="arcade-frame">
    <canvas id="arena" width="512" height="320"></canvas>
  </div>
  <div class="credits">— FORMAÇÃO Δ-11 DEMO —</div>

  <!-- Os 3 módulos gerados pelos agentes em paralelo -->
  <script src="sprites.js"></script>
  <script src="stage.js"></script>
  <script src="effects.js"></script>

  <!-- Bootstrap: inicia o engine após carregar tudo -->
  <script>
    window.addEventListener('load', function () {
      // Garante pixel art nítida sem anti-aliasing
      const canvas = document.getElementById('arena');
      const ctx = canvas.getContext('2d');
      ctx.imageSmoothingEnabled = false;

      // Inicia o loop principal
      window.SOLDADO_ENGINE.init('arena');
    });
  </script>
</body>
</html>
